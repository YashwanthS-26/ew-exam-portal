<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline-variant pointer-events-none text-[20px]">
                            mail
                        </span>
<input class="w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="email" name="email" placeholder="admin@organization.edu" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base relative">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline-variant pointer-events-none text-[20px]">
                            lock
                        </span>
<input class="w-full pl-10 pr-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>

<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container-lowest transition-colors" type="checkbox"/>
<span class="font-body-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-variant transition-colors hover:underline underline-offset-4" href="#">Forgot password?</a>
</div>

<button class="w-full bg-primary text-on-primary py-3 px-6 rounded-lg font-label-md text-label-md font-semibold hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all shadow-[0_1px_3px_rgba(0,0,0,0.1),_0_10px_15px_-5px_rgba(0,0,0,0.1)] flex items-center justify-center gap-2" type="submit">
